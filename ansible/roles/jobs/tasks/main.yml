---
- name: Create yeet directories
  file:
    path: "{{ item }}"
    state: directory
    owner: runner
    group: runner
    mode: "0755"
  loop:
    - "{{ yeet_dir }}/jobs"
    - "{{ yeet_dir }}/scripts"

- name: Deploy run-agent.sh script
  copy:
    dest: "{{ yeet_dir }}/scripts/run-agent.sh"
    content: |
      #!/bin/bash
      # run-agent.sh — Entrypoint for Nomad-dispatched coding agent jobs
      # Usage: run-agent.sh <agent> <project> <prompt> [workspace]
      set -euo pipefail

      AGENT="${1:?Usage: run-agent.sh <agent> <project> <prompt> [workspace]}"
      PROJECT="${2:?Missing project}"
      PROMPT="${3:?Missing prompt}"
      WORKSPACE="${4:-/opt/yeet/workspaces/$PROJECT}"

      # Load environment (API keys)
      if [ -f /opt/yeet/.env ]; then
        set -a
        source /opt/yeet/.env
        set +a
      fi

      cd "$WORKSPACE"

      case "$AGENT" in
        claude)
          exec claude --print --output-format text "$PROMPT"
          ;;
        opencode)
          exec opencode --non-interactive "$PROMPT"
          ;;
        aider)
          exec aider --message "$PROMPT" --yes
          ;;
        *)
          echo "ERROR: Unknown agent '$AGENT'. Supported: claude, opencode, aider"
          exit 1
          ;;
      esac
    owner: runner
    group: runner
    mode: "0755"

- name: Deploy Nomad job template
  copy:
    dest: "{{ yeet_dir }}/jobs/run-coding-agent.nomad.hcl"
    content: |
      job "run-coding-agent" {
        type        = "batch"
        datacenters = ["dc1"]

        parameterized {
          payload       = "forbidden"
          meta_required = ["agent", "project", "prompt"]
          meta_optional = ["workspace"]
        }

        group "agent" {
          count = 1

          task "run" {
            driver = "raw_exec"

            config {
              command = "/opt/yeet/scripts/run-agent.sh"
              args = [
                "${NOMAD_META_agent}",
                "${NOMAD_META_project}",
                "${NOMAD_META_prompt}",
                "${NOMAD_META_workspace}",
              ]
            }

            env {
              HOME = "/home/runner"
              PATH = "/usr/local/bin:/usr/bin:/bin:/home/runner/go/bin"
            }

            resources {
              cpu    = 500
              memory = 512
            }
          }
        }
      }
    owner: runner
    group: runner
    mode: "0644"

- name: Register parameterized job with Nomad
  become: true
  become_user: runner
  shell: |
    nomad job run {{ yeet_dir }}/jobs/run-coding-agent.nomad.hcl
  environment:
    NOMAD_ADDR: "http://127.0.0.1:4646"
  when: nomad_role == "server"
  changed_when: true
