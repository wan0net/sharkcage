---
- name: Add Tailscale signing key
  shell: |
    curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg \
      | tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
  args:
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

- name: Add Tailscale apt repository
  copy:
    dest: /etc/apt/sources.list.d/tailscale.list
    content: |
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main

- name: Install Tailscale
  apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start Tailscale service
  systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Join Tailscale network
  shell: |
    tailscale up \
      --authkey={{ tailscale_authkey }} \
      --hostname={{ inventory_hostname }} \
      --ssh
  args:
    creates: /var/lib/tailscale/tailscaled.state
  when: tailscale_authkey is defined and tailscale_authkey | length > 0

- name: Get Tailscale IP
  command: tailscale ip -4
  register: tailscale_ip
  changed_when: false

- name: Store Tailscale IP as fact
  set_fact:
    ts_ip: "{{ tailscale_ip.stdout | trim }}"
