---
- name: Download openshell tarball
  get_url:
    url: "https://github.com/NVIDIA/OpenShell/releases/download/v{{ openshell_version | default('0.0.16') }}/openshell-x86_64-unknown-linux-musl.tar.gz"
    dest: /tmp/openshell.tar.gz

- name: Extract openshell binary
  unarchive:
    src: /tmp/openshell.tar.gz
    dest: /usr/local/bin/
    remote_src: true
    mode: "0755"

- name: Verify openshell installation
  command: openshell --version
  register: openshell_ver
  changed_when: false
  ignore_errors: true

- name: Print OpenShell version
  debug:
    msg: "OpenShell: {{ openshell_ver.stdout | default('not installed or not runnable on this arch') }}"

- name: Create policy directories
  file:
    path: "{{ yeet_dir }}/policies"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Deploy base sandbox policy
  copy:
    dest: "{{ yeet_dir }}/policies/base.json"
    content: |
      {
        "version": "1",
        "description": "Base sandbox policy for coding agents",
        "filesystem": {
          "allow_read": [
            "/opt/yeet/workspaces",
            "/usr/lib",
            "/usr/share",
            "/etc/ssl",
            "/etc/resolv.conf"
          ],
          "allow_write": [
            "/opt/yeet/workspaces",
            "/tmp"
          ],
          "deny": [
            "/etc/shadow",
            "/etc/passwd",
            "/root",
            "/home/runner/.ssh"
          ]
        },
        "network": {
          "allow_outbound": true,
          "allow_inbound": false
        }
      }
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Check Landlock LSM availability
  shell: cat /sys/kernel/security/lsm
  register: lsm_list
  changed_when: false
  ignore_errors: true

- name: Warn if Landlock is not available
  debug:
    msg: >-
      WARNING: Landlock LSM not detected in kernel. OpenShell will run in
      best_effort mode with reduced filesystem isolation. Upgrade to kernel
      5.13+ or Ubuntu 22.04+ for full sandboxing.
  when: lsm_list.stdout is defined and lsm_list.stdout is not search("landlock")
