---
- name: Install signal-cli dependencies
  apt:
    name:
      - openjdk-21-jre-headless
      - wget
    state: present

- name: Download signal-cli
  get_url:
    url: "https://github.com/AsamK/signal-cli/releases/download/v{{ signal_cli_version | default('0.13.12') }}/signal-cli-{{ signal_cli_version | default('0.13.12') }}-Linux.tar.gz"
    dest: /tmp/signal-cli.tar.gz

- name: Extract signal-cli
  unarchive:
    src: /tmp/signal-cli.tar.gz
    dest: /opt/
    remote_src: true

- name: Symlink signal-cli binary
  file:
    src: "/opt/signal-cli-{{ signal_cli_version | default('0.13.12') }}/bin/signal-cli"
    dest: /usr/local/bin/signal-cli
    state: link

- name: Verify signal-cli
  command: signal-cli --version
  register: signal_ver
  changed_when: false

- name: Print signal-cli version
  debug:
    msg: "signal-cli: {{ signal_ver.stdout }}"

- name: Create signal-cli data directory
  file:
    path: /var/lib/signal-cli
    state: directory
    owner: runner
    group: runner
    mode: "0700"

- name: Deploy signal-cli systemd service
  template:
    src: signal-cli.service.j2
    dest: /etc/systemd/system/signal-cli.service
    mode: "0644"
  notify: restart signal-cli

- name: Enable and start signal-cli
  systemd:
    name: signal-cli
    enabled: true
    state: started
    daemon_reload: true
