---
- name: Download Nomad binary
  get_url:
    url: "https://releases.hashicorp.com/nomad/{{ nomad_version }}/nomad_{{ nomad_version }}_linux_amd64.zip"
    dest: /tmp/nomad.zip

- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Extract Nomad binary
  unarchive:
    src: /tmp/nomad.zip
    dest: /usr/local/bin/
    remote_src: true
    mode: "0755"

- name: Verify Nomad installation
  command: nomad version
  register: nomad_ver
  changed_when: false

- name: Print Nomad version
  debug:
    msg: "{{ nomad_ver.stdout }}"

- name: Create Nomad data directory
  file:
    path: /opt/nomad/data
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create Nomad config directory
  file:
    path: /etc/nomad.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Nomad server+client config
  copy:
    dest: /etc/nomad.d/nomad.hcl
    content: |
      # Nomad server+client configuration
      # Generated by Ansible for {{ inventory_hostname }}

      data_dir = "/opt/nomad/data"
      bind_addr = "0.0.0.0"

      advertise {
        http = "{{ ansible_host }}:4646"
        rpc  = "{{ ansible_host }}:4647"
        serf = "{{ ansible_host }}:4648"
      }

      server {
        enabled          = true
        bootstrap_expect = 1
      }

      client {
        enabled = true
        # Node metadata — configure via host_vars per node, e.g.:
        #   node_meta:
        #     project_peer6: "true"
        #     device_yubikey: "true"
        meta {}
      }

      plugin "raw_exec" {
        config {
          enabled = true
        }
      }

      plugin "docker" {
        config {
          allow_privileged = true
          volumes {
            enabled = true
          }
        }
      }
    owner: root
    group: root
    mode: "0640"
  when: nomad_role == "server"
  notify: restart nomad

- name: Deploy Nomad client-only config
  copy:
    dest: /etc/nomad.d/nomad.hcl
    content: |
      # Nomad client-only configuration
      # Generated by Ansible for {{ inventory_hostname }}

      data_dir = "/opt/nomad/data"

      server {
        enabled = false
      }

      client {
        enabled = true
        servers = ["{{ nomad_server_ip }}:4647"]
        # Node metadata — configure via host_vars per node, e.g.:
        #   node_meta:
        #     project_peer6: "true"
        #     device_yubikey: "true"
        #     device_yubikey_path: "/dev/yubikey-1"
        meta {}
      }

      plugin "raw_exec" {
        config {
          enabled = true
        }
      }
    owner: root
    group: root
    mode: "0640"
  when: nomad_role == "client"
  notify: restart nomad

- name: Deploy Nomad systemd service
  copy:
    dest: /etc/systemd/system/nomad.service
    content: |
      [Unit]
      Description=HashiCorp Nomad
      Documentation=https://nomadproject.io/docs/
      Wants=network-online.target
      After=network-online.target

      [Service]
      ExecStart=/usr/local/bin/nomad agent -config=/etc/nomad.d/
      ExecReload=/bin/kill -HUP $MAINPID
      KillMode=process
      KillSignal=SIGINT
      LimitNOFILE=65536
      LimitNPROC=infinity
      Restart=on-failure
      RestartSec=2
      TasksMax=infinity

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: reload systemd

- name: Enable and start Nomad
  systemd:
    name: nomad
    enabled: true
    state: started
    daemon_reload: true
