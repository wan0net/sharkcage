---
- name: Install Docker prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Add Docker apt repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: true

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Start Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Install NemoClaw
  shell: curl -fsSL https://www.nvidia.com/nemoclaw.sh | bash
  args:
    creates: /usr/bin/nemoclaw
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Verify NemoClaw installation
  command: nemoclaw --version
  register: nemoclaw_ver
  changed_when: false

- name: Print NemoClaw version
  debug:
    msg: "NemoClaw: {{ nemoclaw_ver.stdout }}"

- name: Create OpenClaw config directory
  file:
    path: "/home/{{ ansible_user }}/.openclaw"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Create OpenClaw skills directory
  file:
    path: "/home/{{ ansible_user }}/.openclaw/skills"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Create NemoClaw config directory
  file:
    path: "/home/{{ ansible_user }}/.nemoclaw"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Deploy OpenClaw configuration
  template:
    src: openclaw.json.j2
    dest: "/home/{{ ansible_user }}/.openclaw/openclaw.json"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Deploy NemoClaw credentials
  template:
    src: nemoclaw-credentials.json.j2
    dest: "/home/{{ ansible_user }}/.nemoclaw/credentials.json"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Create skill directories
  file:
    path: "/home/{{ ansible_user }}/.openclaw/skills/{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - dispatch
    - status
    - logs
    - stop
    - continue
    - manage
    - cost

- name: Deploy SKILL.md files
  template:
    src: "skills/{{ item }}/SKILL.md.j2"
    dest: "/home/{{ ansible_user }}/.openclaw/skills/{{ item }}/SKILL.md"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  loop:
    - dispatch
    - status
    - logs
    - stop
    - continue
    - manage
    - cost

- name: Deploy NemoClaw sandbox network policy
  template:
    src: openclaw-sandbox.yaml.j2
    dest: "{{ yeet_dir }}/policies/openclaw-sandbox.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Deploy NemoClaw Nomad service job
  copy:
    src: yeet-nemoclaw.nomad.hcl
    dest: "{{ yeet_dir }}/jobs/yeet-nemoclaw.nomad.hcl"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Register NemoClaw service job
  become_user: "{{ ansible_user }}"
  shell: nomad job run {{ yeet_dir }}/jobs/yeet-nemoclaw.nomad.hcl
  environment:
    NOMAD_ADDR: "http://127.0.0.1:4646"
  changed_when: true
