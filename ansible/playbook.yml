---
- name: Provision fleet (shared)
  hosts: fleet
  become: true
  vars:
    yeet_dir: /opt/yeet
  roles:
    - base
    - role: tailscale
      when: tailscale_authkey is defined
    - node
    - nomad
    - sandbox

- name: Provision master
  hosts: masters
  become: true
  vars:
    yeet_dir: /opt/yeet
  roles:
    - signal
    - nemoclaw
    - jobs

- name: Provision workers
  hosts: workers
  become: true
  vars:
    yeet_dir: /opt/yeet
  roles:
    - runtimes
    - git
    - devices
