# Base sandbox policy for yeet agent tasks
# Extended per-task by run-agent.sh with project-specific paths and hosts

filesystem:
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /etc
    - /opt/yeet/devices/
  read_write:
    - /tmp

network:
  # Default: no network access
  # Per-task policies add allowed_hosts based on runtime and project
  allowed_hosts: []

process:
  # Run as current user (runner)
  max_processes: 256
  max_open_files: 4096
