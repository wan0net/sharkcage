name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build plugin
        run: |
          npx tsc -p tsconfig.plugin.json --outDir dist/sharkcage-build
          mkdir -p dist/sharkcage dist/supervisor
          cp dist/sharkcage-build/plugin/* dist/sharkcage/
          cp dist/sharkcage-build/supervisor/types.js dist/supervisor/ 2>/dev/null || true
          cp dist/sharkcage-build/supervisor/types.d.ts dist/supervisor/ 2>/dev/null || true
          cp src/plugin/openclaw.plugin.json dist/sharkcage/
          cp src/plugin/security-patterns.json dist/sharkcage/

      - name: Validate security patterns
        run: node -e "const p = require('./src/plugin/security-patterns.json'); console.log('Patterns OK:', Object.keys(p.secrets).length, 'secrets,', p.dangerous_commands.length, 'commands,', p.sensitive_files.length, 'files')"

      - name: Verify CLI loads
        run: npx tsx src/cli/main.ts help

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Semgrep SAST
        run: |
          pip install semgrep
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/security-audit \
            --config p/command-injection \
            --sarif \
            --output semgrep-results.sarif \
            --exclude node_modules \
            || true

      - name: Upload Semgrep results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
