name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run test suite
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Validate security patterns
        run: node -e "const p = require('./src/plugin/security-patterns.json'); console.log('Patterns OK:', Object.keys(p.secrets).length, 'secrets,', p.dangerous_commands.length, 'commands,', p.sensitive_files.length, 'files')"

      - name: Verify CLI loads
        run: npx tsx src/cli/main.ts help

  sandbox-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux sandbox dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap ripgrep socat

      - name: Install npm dependencies
        run: npm ci

      - name: Show sandbox tool versions
        run: |
          rg --version
          bwrap --version
          socat -V | head -n 1
          npx srt --help >/dev/null

      - name: Run real worker smoke test
        run: node --import tsx --test --test-concurrency=1 test/supervisor-real-worker.test.ts

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Semgrep SAST
        run: |
          pip install semgrep
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/security-audit \
            --config p/command-injection \
            --sarif \
            --output semgrep-results.sarif \
            --exclude node_modules \
            || true

      - name: Upload Semgrep results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
