<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#111110" stroke="#3b82f6" stroke-width="2"/>

  <!-- Stylized hand throwing gesture (simplified) -->
  <g transform="translate(40, 55) scale(0.7)">
    <!-- Arm arc showing throwing motion -->
    <path d="M 30 120 Q 50 40, 130 30" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <path d="M 40 110 Q 60 45, 125 35" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.25"/>

    <!-- The "thrown" object - a code block / terminal prompt -->
    <g transform="translate(120, 10) rotate(15)">
      <rect x="0" y="0" width="44" height="32" rx="4" fill="#1c1c1b" stroke="#3b82f6" stroke-width="2"/>
      <!-- Terminal prompt lines -->
      <line x1="6" y1="10" x2="14" y2="10" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="17" y1="10" x2="34" y2="10" stroke="#ededed" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="6" y1="18" x2="10" y2="18" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="13" y1="18" x2="28" y2="18" stroke="#ededed" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    </g>

    <!-- Motion lines -->
    <line x1="95" y1="55" x2="110" y2="45" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="90" y1="65" x2="108" y2="52" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    <line x1="85" y1="75" x2="105" y2="60" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- "yeet" text -->
  <text x="100" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#3b82f6" letter-spacing="-0.03em">yeet</text>
</svg>
