services:
  godot-mcp:
    build: .
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ./project:/project            # Mount your Godot project here
      - ./godot-mcp-pro:/opt/godot-mcp  # Mount MCP Pro server here
    ports:
      - "6505:6505"                   # MCP Pro WebSocket
    stdin_open: true
    tty: true
